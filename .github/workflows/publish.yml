name: Publish

on:
  schedule:
    # Every day at midnight
    - cron: '0 0 * * *'
  # Manual release of node-talisman itself (independent of Talisman upgrades),
  # e.g. after a dependency or internal change.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave blank to auto patch-bump)'
        required: false
        default: ''

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [12.x]

    steps:
      - uses: actions/checkout@v2
        with:
          # for triggering another workflow
          # https://stackoverflow.com/questions/60418323/triggering-a-new-workflow-from-another-workflow
          # https://docs.github.com/en/free-pro-team@latest/actions/reference/events-that-trigger-workflows#triggering-new-workflows-using-a-personal-access-token
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org/

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.OS }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.OS }}-node-
            ${{ runner.OS }}-

      - name: Install dependencies
        run: npm ci

      # Scheduled run: bump only when Thoughtworks ships a new Talisman release.
      - name: Publish new version (scheduled Talisman upgrade)
        if: github.event_name == 'schedule'
        run: node scripts/release --trace-uncaught
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_TALISMAN_NPM_TOKEN }}

      # Manual run: publish the current code with an explicit or patch-bumped version.
      - name: Publish new version (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('semver').inc(require('./package.json').version, 'patch')")
          fi
          echo "Publishing node-talisman $VERSION"
          npm run publish -- "$VERSION" --no-release-draft
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_TALISMAN_NPM_TOKEN }}
